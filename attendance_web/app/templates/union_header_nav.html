{# ── Shared topbar ── #}
<div class="un-topbar">
    <div class="un-bread">
        <span>Công đoàn</span>
        <span class="sep">/</span>
        <span class="cur">{{ union_page_title }}</span>
    </div>

    <span class="un-year-badge">{{ year }}</span>

    <form method="get" class="un-period-form" style="margin-left:auto;">
        <label for="un-year-input">Năm</label>
        <input id="un-year-input" type="number" min="2000" max="2100" name="year" value="{{ year }}" required>
        <label for="un-month-input">Tháng TK</label>
        <input id="un-month-input" type="month" name="month_key" value="{{ month_key }}" required>
        <button type="submit"><i class="bi bi-search"></i> Xem</button>
    </form>
</div>

{# ── Tab bar ── #}
<div class="un-tabs">
    <a class="un-tab {% if active_tab == 'home' %}active{% endif %}"
       href="{{ url_for('union_index', year=year, month_key=month_key) }}">
        <i class="bi bi-grid-1x2"></i> Tổng quan
    </a>
    <a class="un-tab {% if active_tab == 'bank' %}active{% endif %}"
       href="{{ url_for('union_bank_page', year=year, month_key=month_key) }}">
        <i class="bi bi-bank2"></i> Chuyển khoản
    </a>
    <a class="un-tab {% if active_tab == 'cash' %}active{% endif %}"
       href="{{ url_for('union_cash_page', year=year, month_key=month_key) }}">
        <i class="bi bi-wallet2"></i> Tiền mặt
    </a>
    <a class="un-tab {% if active_tab == 'events' %}active{% endif %}"
       href="{{ url_for('union_events_page', year=year, month_key=month_key) }}">
        <i class="bi bi-calendar-event"></i> Sự kiện lễ
    </a>
</div>
