{% extends "base.html" %}
{% block content %}
<div class="panel">
    <h2>Chỉnh sửa mã ca: {{ shift.code }}</h2>
    <p class="muted">Sửa thông tin ca tại trang riêng. Sau khi lưu, bảng chi tiết sẽ được tính theo cấu hình mới.</p>

    <form method="post" class="form-grid">
        <input value="{{ shift.code }}" readonly>
        <input name="name" placeholder="Tên ca" value="{{ shift.name }}" required>
        <input
            type="time"
            name="start_time"
            value="{{ shift.start_time.strftime('%H:%M') if shift.start_time else '' }}"
            placeholder="Giờ vào"
        >
        <input
            type="time"
            name="end_time"
            value="{{ shift.end_time.strftime('%H:%M') if shift.end_time else '' }}"
            placeholder="Giờ ra"
        >
        <input
            type="number"
            step="1"
            min="0"
            name="break_minutes"
            value="{{ shift.break_minutes }}"
            placeholder="Nghỉ (phút)"
        >
        <input
            type="number"
            step="0.5"
            min="0"
            name="standard_hours"
            value="{{ shift.standard_hours }}"
            placeholder="Giờ quy định"
        >
        <input
            type="number"
            step="0.5"
            min="0"
            name="default_overtime_hours"
            value="{{ shift.default_overtime_hours }}"
            placeholder="OT mặc định"
        >
        <input
            type="number"
            step="1000"
            min="0"
            name="meal_allowance"
            value="{{ shift.meal_allowance }}"
            placeholder="Tiền ăn"
        >
        <input name="changed_by" placeholder="Người sửa" value="admin">
        <input name="notes" placeholder="Ghi chú" value="{{ shift.notes or '' }}">
        <label><input type="checkbox" name="is_leave_code" {% if shift.is_leave_code %}checked{% endif %}> Mã nghỉ</label>
        <label><input type="checkbox" name="is_paid_leave" {% if shift.is_paid_leave %}checked{% endif %}> Nghỉ vẫn tính lương</label>
        <button type="submit">Cập nhật ca</button>
    </form>

    <div class="panel" style="margin-top: 16px;">
        <h3>Thao tác</h3>
        <div class="row-actions">
            <a href="{{ url_for('shifts') }}"><button type="button">Quay lại danh sách ca</button></a>
            <form class="row-action-form" method="post" action="{{ url_for('delete_shift', shift_id=shift.id) }}" onsubmit="return confirm('Xóa mã ca này?');">
                <input type="hidden" name="changed_by" value="admin">
                <button type="submit" class="secondary">Xóa mã ca này</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
